name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Node ${{ matrix.node }} — Tests + Coverage
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ["20.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Устанавливаем зависимости каждого под-пакета отдельно.
      # Корневой package.json не имеет production-зависимостей —
      # только прокси-скрипты к под-пакетам.
      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: |
            public-api/package-lock.json
            private-api/package-lock.json

      - name: Install — public-api
        working-directory: public-api
        run: npm ci

      - name: Install — private-api
        working-directory: private-api
        run: npm ci

      # Основной прогон тестов (все под-пакеты через корневой скрипт).
      - name: Run tests
        run: npm test

      # Coverage — отдельный шаг, чтобы провал не скрывал результаты
      # основного прогона. Работаем из под-пакетов напрямую.
      - name: Coverage — public-api
        working-directory: public-api
        run: npm run test:coverage

      - name: Coverage — private-api
        working-directory: private-api
        run: npm run test:coverage

      # Артефакты coverage для последующего сравнения в PR.
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node }}
          path: |
            public-api/coverage/
            private-api/coverage/
          retention-days: 14
