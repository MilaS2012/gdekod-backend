name: Deploy Staging

# Запускается при пуше в main. Выполняет pre-deploy проверки:
# тесты + grep на mock-строки. Реальный деплой в Yandex Cloud
# раскомментировать после получения доступа к аккаунту.
#
# Необходимые GitHub Secrets:
#   YC_OAUTH_TOKEN        — OAuth токен сервисного аккаунта Yandex Cloud
#   YC_FOLDER_ID          — ID folder'а в Yandex Cloud
#   STAGING_HEALTH_TOKEN  — Bearer-токен для smoke-теста /health после деплоя

on:
  push:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # 1. Pre-deploy: тесты + проверка отсутствия mock в production-bundle
  # ---------------------------------------------------------------------------
  pre-deploy-checks:
    name: Pre-deploy checks (tests + no-mock guard)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: |
            public-api/package-lock.json
            private-api/package-lock.json

      - name: Install — public-api
        working-directory: public-api
        run: npm ci

      - name: Install — private-api
        working-directory: private-api
        run: npm ci

      - name: Run all tests (must be green before any deploy)
        run: npm test

      # Проверяем что в коде нет захардкоженных mock-строк.
      # Скрипт завершается с exit 1 если находит их при NODE_ENV=production.
      - name: Check no mock strings in production code
        env:
          NODE_ENV: production
        run: bash scripts/check-no-mock-in-prod.sh

